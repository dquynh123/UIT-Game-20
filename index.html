<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guided By Memories</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="fade-overlay"></div>
    <div id="main-menu" class="screen">
        <img src="assets/images/anh2.png" alt="Guided by Memories" class="game-title-img">
    
        <button id="main-start-btn" class="img-btn">
            <img src="assets/images/anh3.png" alt="PRESS ANY BUTTON TO START">
        </button>
    </div>

    <div id="name-screen" class="screen hidden">
        <div class="name-content">
            <p>(Kimi no na wa)</p>
            <h2>Nhập tên của bạn</h2>
            <input type="text" id="user-name" placeholder="Tên của bạn...">
            <button id="enter-btn">ENTER</button>
        </div>
    </div>

    <div id="game-scene" class="hidden">
        
        <div id="toa-a" class="building-container">
            <div id="start-screen-toa-a" class="screen-container">
                <h2>THƯ VIỆN TÒA A</h2>
                <p>Sắp xếp sách vào đúng ngăn có dán nhãn trước khi hết giờ!</p>
                <p id="level-info">Màn 1: 4 Ngăn (20 ĐRL)</p>
                <button id="toa-a-start-btn" class="action-btn">BẮT ĐẦU</button>
            </div>

            <div id="game-screen-toa-a" class="screen-container hidden">
                <div class="game-hud">
                    <div class="hud-item timer-box">⏳ <span id="time-display">00:30</span></div>
                    <div class="hud-item score-box">⭐ ĐRL: <span id="drl-display">0</span></div>
                </div>
                <div id="shelf-grid"></div>
            </div>

            <div id="level-complete-screen" class="screen-container hidden">
                <h2 id="complete-title">QUA MÀN!</h2>
                <p>Bạn nhận được: <span id="reward-display" class="highlight">20 ĐRL</span></p>
                <button id="next-level-btn" class="action-btn">Chơi Màn Tiếp Theo</button>
            </div>

            <div id="game-over-screen" class="screen-container hidden">
                <h2>HẾT GIỜ!</h2>
                <p>Thủ thư đã phát hiện kệ sách bừa bộn.</p>
                <button id="retry-btn" class="action-btn">Chơi lại màn này</button>
            </div>
        </div>

        <div id="toa-b" class="building-container"></div>
        <div id="toa-c" class="screen hidden"> 
            <div class="quiz-container">
                <div class="question-section">
                    <h2 id="question-text">Đang tải câu hỏi...</h2>
                </div>

                <div id="answer-buttons" class="answers-section">
                </div>
            </div>
        </div>
        <div id="toa-d" class="building-container"></div>
        <div id="toa-e" class="building-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
